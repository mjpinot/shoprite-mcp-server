# ---------------------------------------------------------------------------
# Shoprite MCP Server – Nginx virtual host
# Place in nginx/conf.d/mcp.conf
# ---------------------------------------------------------------------------

upstream mcp_backend {
    server mcp-proxy:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name mcp.yourdomain.com;   # Replace with your domain

    # Redirect all HTTP → HTTPS in production
    # return 301 https://$host$request_uri;

    location / {
        limit_req zone=mcp_limit burst=10 nodelay;

        proxy_pass         http://mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / streaming support
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health check endpoint
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}


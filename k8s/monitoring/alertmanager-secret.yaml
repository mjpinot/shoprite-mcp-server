apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: shoprite-mcp
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
type: Opaque
# Replace these with your real values (base64-encoded or use stringData)
# In production use Sealed Secrets or External Secrets Operator.
stringData:
  ALERTMANAGER_SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  ALERTMANAGER_SMTP_PASSWORD: "your-smtp-app-password"

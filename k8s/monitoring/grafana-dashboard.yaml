apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning
  namespace: shoprite-mcp
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: shoprite-mcp
        orgId: 1
        folder: "Shoprite MCP"
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-shoprite-mcp
  namespace: shoprite-mcp
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
data:
  shoprite-mcp.json: |
    {
      "title": "Shoprite MCP Server",
      "uid": "shoprite-mcp-server",
      "tags": ["shoprite", "mcp"],
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "Tool Calls per Second",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum by (tool) (rate(shoprite_mcp_tool_calls_total[5m]))",
              "legendFormat": "{{tool}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "id": 2,
          "title": "Tool Error Rate (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum by (tool) (rate(shoprite_mcp_tool_calls_total{status=\"error\"}[5m])) / sum by (tool) (rate(shoprite_mcp_tool_calls_total[5m])) * 100",
              "legendFormat": "{{tool}} errors",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 30}
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Tool p50 / p95 / p99 Latency",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (tool, le) (rate(shoprite_mcp_tool_call_duration_seconds_bucket[5m])))",
              "legendFormat": "{{tool}} p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (tool, le) (rate(shoprite_mcp_tool_call_duration_seconds_bucket[5m])))",
              "legendFormat": "{{tool}} p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (tool, le) (rate(shoprite_mcp_tool_call_duration_seconds_bucket[5m])))",
              "legendFormat": "{{tool}} p99",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "s"}
          }
        },
        {
          "id": 4,
          "title": "Active Tool Calls (in-flight)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "sum(shoprite_mcp_active_tool_calls)",
              "legendFormat": "Active",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 50}
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "HTTP Scrape Errors/s",
          "type": "timeseries",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 8},
          "targets": [
            {
              "expr": "sum by (error_type) (rate(shoprite_mcp_http_errors_total[5m]))",
              "legendFormat": "{{error_type}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"}
          }
        },
        {
          "id": 6,
          "title": "Outbound HTTP Latency p95 (to shoprite.com)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (url_path, le) (rate(shoprite_mcp_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{url_path}} p95",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "s"}
          }
        },
        {
          "id": 7,
          "title": "Products Returned (avg per search)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 16},
          "targets": [
            {
              "expr": "rate(shoprite_mcp_products_returned_sum[5m]) / rate(shoprite_mcp_products_returned_count[5m])",
              "legendFormat": "avg",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "short", "decimals": 1}
          }
        },
        {
          "id": 8,
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 16},
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"shoprite-mcp\", container=\"mcp-server\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "bytes"}
          }
        },
        {
          "id": 9,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"shoprite-mcp\", container=\"mcp-server\"}[5m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "cores"}
          }
        },
        {
          "id": 10,
          "title": "Available Replicas",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 24},
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"shoprite-mcp\", deployment=\"shoprite-mcp-server\"}",
              "legendFormat": "Available",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "green", "value": 2}
                ]
              }
            }
          }
        },
        {
          "id": 11,
          "title": "Firing Alerts",
          "type": "alertlist",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "options": {
            "alertName": "",
            "dashboardAlerts": false,
            "groupMode": "default",
            "maxItems": 20,
            "sortOrder": 1,
            "stateFilter": {
              "firing": true,
              "pending": true
            }
          }
        }
      ],
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {}
    }

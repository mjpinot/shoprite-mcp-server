apiVersion: v1
kind: ServiceAccount
metadata:
  name: shoprite-mcp-sa
  namespace: shoprite-mcp
  labels:
    app.kubernetes.io/name: shoprite-mcp
    app.kubernetes.io/component: serviceaccount
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shoprite-mcp-role
  namespace: shoprite-mcp
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shoprite-mcp-rolebinding
  namespace: shoprite-mcp
subjects:
  - kind: ServiceAccount
    name: shoprite-mcp-sa
    namespace: shoprite-mcp
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: shoprite-mcp-role

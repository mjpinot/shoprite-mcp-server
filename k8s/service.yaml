apiVersion: v1
kind: Service
metadata:
  name: shoprite-mcp-service
  namespace: shoprite-mcp
  labels:
    app.kubernetes.io/name: shoprite-mcp
    app.kubernetes.io/component: server
spec:
  selector:
    app.kubernetes.io/name: shoprite-mcp
    app.kubernetes.io/component: server
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: sse
      protocol: TCP
      port: 9090
      targetPort: 9090
    - name: metrics
      protocol: TCP
      port: 9091
      targetPort: 9090    # same port — metrics and SSE share port 9090 inside the pod
  type: ClusterIP

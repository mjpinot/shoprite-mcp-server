version: "3.9"

# ---------------------------------------------------------------------------
# Production overrides – use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ---------------------------------------------------------------------------

services:
  mcp-server:
    # Pull from registry instead of building locally
    image: ${DOCKER_REGISTRY:-ghcr.io/mjpinot}/shoprite-mcp-server:${IMAGE_TAG:-latest}
    build:
      # Disable volume mount for hot-reload in production
      cache_from:
        - ${DOCKER_REGISTRY:-ghcr.io/mjpinot}/shoprite-mcp-server:latest
    volumes: []
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  mcp-proxy:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # TLS certificates
    ports:
      - "80:80"
      - "443:443"
    restart: always

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
